# PermissionManagerX 持续构建工作流
# 作用：代码格式检查(spotless) + native 库编译(NDK 4 ABI) + APK 构建(Debug/Release)
name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# 同一分支的新推送取消正在进行的旧运行，节省额度
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17（项目强制版本）
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 配置 Android SDK 并安装 NDK 与构建工具
        # packages 覆盖默认值，需显式包含 tools/platform-tools
        # NDK 版本须与 app/build.gradle 的 NDK_VER 常量一致
        uses: android-actions/setup-android@v4
        with:
          packages: >-
            tools
            platform-tools
            build-tools;36.0.0
            platforms;android-36
            ndk;28.2.13676358

      - name: 生成 local.properties（buildNative 硬编码读取 sdk.dir）
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 授予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 代码格式检查 + 编译 Debug/Release APK
        # assembleDebug/assembleRelease 会自动触发 buildNative 编译 native 库
        run: ./gradlew spotlessCheck assembleDebug assembleRelease --no-daemon

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pmx-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: 上传 Release APK（未签名，仅验证 release 构建）
        uses: actions/upload-artifact@v4
        with:
          name: pmx-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
